    <path d="M208 16 l-9 -6 0 12 z" fill="#3a4a5a"/>
    <rect x="222" y="0" width="100" height="32" rx="8" fill="#1f6feb"/>
    <text x="272" y="21" text-anchor="middle" fill="#ffffff" font-family="ui-monospace,Menlo,monospace">.mcpb</text>
    <line x1="334" y1="16" x2="382" y2="16" stroke="#3a4a5a" stroke-width="3"/>
