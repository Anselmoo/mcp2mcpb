name: Bug report
description: Something didn't work as expected
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Include the exact `mcp2mcpb` command and the package/registry.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: mcp2mcpb version
      description: Output of `mcp2mcpb --version`
    validations:
      required: true
  - type: input
    id: platform
    attributes:
      label: OS / arch
      placeholder: macOS 15 arm64
    validations:
      required: true
