name: 🚀 CI/CD

on:
  push:
    branches:
      - main
      - feat/**
      - fix/**
      - chore/**
      - docs/**
      - refactor/**
      - test/**
      - ci/**
      - perf/**
      - style/**
      - build/**
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

env:
  PACKAGE_NAME: "mcp2mcpb"
  PYTHON_VERSION: "3.12"

jobs:
  lint:
    name: 🔍 Lint & types
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0   # rrt needs history for branch/commit/changelog checks

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --extra dev

      - name: Pre-commit (lint + format + types + hygiene)
        run: SKIP=rrt-branch-name uvx pre-commit run --all-files --show-diff-on-failure

      - name: Validate release policy (rrt)
        if: github.event_name == 'pull_request' || startsWith(github.ref, 'refs/tags/')
        uses: Anselmoo/repo-release-tools@v1.10.0
        with:
          check-branch-name: "false"
          check-commit-subject: "true"
          check-changelog: "true"
          changelog-strategy: "release-only"
          check-release-health: "true"

  test:
    name: 🧪 Tests (${{ matrix.python-version }})
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --extra dev

      - name: Run tests
        run: uv run pytest --cov=src/mcp2mcpb --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          flags: python-${{ matrix.python-version }}
          name: mcp2mcpb-${{ matrix.python-version }}
          fail_ci_if_error: false
          verbose: false

  build:
    name: 📦 Build package
    needs: test
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Build distributions
        run: uv build

      - name: Check distributions
        run: uvx twine check dist/*

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v7
        with:
          name: python-package-distributions
          path: dist/

  sbom:
    name: 📜 Generate SBOM
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          format: spdx-json
          output-file: sbom.spdx.json
          path: .

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v7
        with:
          name: sbom
          path: sbom.spdx.json

  attest:
    name: 🛡️ Attest build provenance
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v8
        with:
          name: python-package-distributions
          path: dist/

      - name: Generate provenance attestation
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: dist/*

  publish-testpypi:
    name: 🧪 Publish to TestPyPI
    needs: [build, sbom, attest]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    environment:
      name: testpypi
      url: https://test.pypi.org/p/mcp2mcpb
    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v8
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true

  verify-testpypi:
    name: 🧪 Verify TestPyPI package
    needs: publish-testpypi
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install package from TestPyPI
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          for attempt in {1..8}; do
            if python -m pip install \
              --index-url https://test.pypi.org/simple/ \
              --extra-index-url https://pypi.org/simple/ \
              "${PACKAGE_NAME}==${VERSION}"; then
              break
            fi
            if [ "$attempt" -eq 8 ]; then
              echo "Package was not installable from TestPyPI after retries."
              exit 1
            fi
            echo "Retrying TestPyPI install in 20s (attempt ${attempt}/8)..."
            sleep 20
          done

      - name: Smoke test installed CLI
        run: mcp2mcpb --version

  publish-pypi:
    name: 🚀 Publish to PyPI
    needs: [build, sbom, attest, publish-testpypi, verify-testpypi]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/p/mcp2mcpb
    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v8
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    name: 🎁 Create GitHub release
    needs: [publish-pypi, sbom]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Download distribution artifacts
        uses: actions/download-artifact@v8
        with:
          name: python-package-distributions
          path: dist/

      - name: Download SBOM artifact
        uses: actions/download-artifact@v8
        with:
          name: sbom
          path: .

      - name: Extract changelog section
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          awk "/^## \[$VERSION\]/{flag=1;next} /^## \[/{flag=0} flag" CHANGELOG.md \
            | sed '/^[[:space:]]*$/{ /./!d }' > release_notes.md
          if [ ! -s release_notes.md ]; then
            echo "No changelog entry found for v${VERSION}" > release_notes.md
          fi

          # Append immutable SHA-pin guidance. On a tag push GITHUB_SHA is the exact
          # commit this tag resolves to, so the release always documents its own pin.
          # Use echoes (not a heredoc) so every line stays inside this YAML block scalar.
          {
            echo ""
            echo "---"
            echo ""
            echo "### 🔒 Pin to an immutable commit SHA"
            echo ""
            echo "For supply-chain safety, pin the action to this release's commit SHA"
            echo "instead of a floating tag (\`@v1\`). The tag \`${GITHUB_REF_NAME}\`"
            echo "resolves to commit \`${GITHUB_SHA}\`:"
            echo ""
            echo '```yaml'
            echo "- uses: ${GITHUB_REPOSITORY}@${GITHUB_SHA}"
            echo "  with:"
            echo "    package: <your-mcp-package>"
            echo "    registry: pypi   # or npm"
            echo "    mode: reference"
            echo '```'
            echo ""
            echo "To trial this exact build from source (e.g. before it propagates on"
            echo "PyPI), also pin \`mcp2mcpb-src\`:"
            echo ""
            echo '```yaml'
            echo "    mcp2mcpb-src: \"git+https://github.com/${GITHUB_REPOSITORY}.git@${GITHUB_SHA}\""
            echo '```'
            echo ""
            echo "Pinning to a full commit SHA is the GitHub Actions supply-chain best"
            echo "practice (immutable; Dependabot still bumps SHA pins)."
          } >> release_notes.md

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          body_path: release_notes.md
          files: |
            dist/*
            sbom.spdx.json
